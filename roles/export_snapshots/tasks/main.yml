- name: Scan all snapshots in src
  os_migrate.os_migrate.volume_snapshot_info:
    cloud: src
    validate_certs: "{{ os_migrate_src_validate_certs | default(omit) }}"
    ca_cert: "{{ os_migrate_src_ca_cert | default(omit) }}"
    client_cert: "{{ os_migrate_src_client_cert | default(omit) }}"
    client_key: "{{ os_migrate_src_client_key | default(omit) }}"
  register: src_snapshots_info

- name: Filter only snapshots to export
  ansible.builtin.set_fact:
    src_snapshots_info: "{{ (src_snapshots_info.snapshots
      | from_yaml
      | os_migrate.os_migrate.stringfilter(os_migrate_snapshots_filter, attribute='name')
      | json_query('[*].{name: name, id: id}')
      | sort(attribute='id')) }}"

- name: Export snapshots
  os_migrate.os_migrate.export_snapshot:
    path: "{{ os_migrate_data_dir }}/snapshots.yml"
    snapshot_id: "{{ item['id'] }}"
    cloud: src
    validate_certs: "{{ os_migrate_src_validate_certs | default(omit) }}"
    ca_cert: "{{ os_migrate_src_ca_cert | default(omit) }}"
    client_cert: "{{ os_migrate_src_client_cert | default(omit) }}"
    client_key: "{{ os_migrate_src_client_key | default(omit) }}"
  loop: "{{ src_snapshots_info }}"
